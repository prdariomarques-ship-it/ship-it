name: Telegram FX Radar

on:
  workflow_dispatch:

jobs:
  fx-radar:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      TELEGRAM_FX_BOT_TOKEN: ${{ secrets.TELEGRAM_FX_BOT_TOKEN }}
      TELEGRAM_FX_CHAT_ID: ${{ secrets.TELEGRAM_FX_CHAT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Send FX radar
        run: python work/send_fx_telegram.py
