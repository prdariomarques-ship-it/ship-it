name: Telegram Market Radar

on:
  workflow_dispatch:
  schedule:
    - cron: "7,22,37,52 * * * *"

jobs:
  market-radar:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Send market radar
        run: python work/send_market_telegram.py
