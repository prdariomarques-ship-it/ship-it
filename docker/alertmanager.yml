global:
  resolve_timeout: 5m

route:
  receiver: 'default'
  group_by: ['alertname', 'severity', 'job']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 4h
  routes:
    - match:
        severity: critical
      receiver: 'critical_webhook'
      continue: true
      repeat_interval: 1h
    - match:
        severity: warning
      receiver: 'warning_default'
      group_interval: 5m
      repeat_interval: 6h
    - match_re:
        alertname: 'PrometheusScrapeFailed|DatabasePool.*'
      receiver: 'critical_webhook'
      repeat_interval: 1h

receivers:
  - name: 'default'
    email_configs:
      - to: 'alerts@darioos'
        smarthost: 'localhost:587'
        from: 'alertmanager@darioos'
        require_tls: false

  - name: 'critical_webhook'
    webhook_configs:
      - url: 'http://localhost:5000/alerts'
        send_resolved: true

  - name: 'warning_default'
    email_configs:
      - to: 'alerts@darioos'
        smarthost: 'localhost:587'
        from: 'alertmanager@darioos'
        require_tls: false

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'job']
