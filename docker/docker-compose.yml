name: darioos

services:
  backend:
    build: ../backend
    restart: unless-stopped
    environment:
      ENVIRONMENT: production
      LOG_JSON: "true"
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-dario}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:-darioos}
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      N8N_BASE_URL: http://n8n:5678
      # LLM providers (Strategy: openai | anthropic | glm | gemini | ollama)
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GLM_API_KEY: ${GLM_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434/v1}
      # WhatsApp providers (Strategy: openwa | baileys | evolution | official)
      WHATSAPP_PROVIDER: ${WHATSAPP_PROVIDER:-openwa}
      OPENWA_BASE_URL: http://openwa:8002
      OPENWA_API_KEY: ${OPENWA_API_KEY:-}
      EVOLUTION_BASE_URL: ${EVOLUTION_BASE_URL:-}
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY:-}
      EVOLUTION_INSTANCE: ${EVOLUTION_INSTANCE:-darioos}
      BAILEYS_BASE_URL: ${BAILEYS_BASE_URL:-}
      BAILEYS_API_KEY: ${BAILEYS_API_KEY:-}
      OFFICIAL_ACCESS_TOKEN: ${OFFICIAL_ACCESS_TOKEN:-}
      OFFICIAL_PHONE_NUMBER_ID: ${OFFICIAL_PHONE_NUMBER_ID:-}
      OFFICIAL_APP_SECRET: ${OFFICIAL_APP_SECRET:-}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:?set WEBHOOK_SECRET in .env}
      # Gmail (opcional — só necessário para usar a integração de e-mail; ver docs/EMAIL.md)
      MAIL_PROVIDER: ${MAIL_PROVIDER:-gmail}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-}
      EMAIL_TOKEN_ENCRYPTION_KEY: ${EMAIL_TOKEN_ENCRYPTION_KEY:-}
      # Google Calendar (opcional — reusa GOOGLE_CLIENT_ID/SECRET acima; ver docs/CALENDAR.md)
      CALENDAR_PROVIDER: ${CALENDAR_PROVIDER:-google}
      GOOGLE_CALENDAR_REDIRECT_URI: ${GOOGLE_CALENDAR_REDIRECT_URI:-}
      # Google Contacts (opcional — reusa GOOGLE_CLIENT_ID/SECRET acima; ver docs/CONTACTS.md)
      CONTACTS_PROVIDER: ${CONTACTS_PROVIDER:-google}
      GOOGLE_CONTACTS_REDIRECT_URI: ${GOOGLE_CONTACTS_REDIRECT_URI:-}
      # Google Drive (opcional — reusa GOOGLE_CLIENT_ID/SECRET acima; ver docs/DRIVE.md)
      DRIVE_PROVIDER: ${DRIVE_PROVIDER:-google}
      GOOGLE_DRIVE_REDIRECT_URI: ${GOOGLE_DRIVE_REDIRECT_URI:-}
      GDRIVE_MAX_FILE_SIZE_BYTES: ${GDRIVE_MAX_FILE_SIZE_BYTES:-20000000}
      # WhatsApp end-to-end auto-reply (webhook -> AI Orchestrator -> send)
      AUTO_REPLY_ENABLED: ${AUTO_REPLY_ENABLED:-true}
      AUTO_REPLY_MAX_PER_CONTACT_PER_MINUTE: ${AUTO_REPLY_MAX_PER_CONTACT_PER_MINUTE:-6}
      AGENT_RUN_TIMEOUT_SECONDS: ${AGENT_RUN_TIMEOUT_SECONDS:-60}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://localhost:3000}
      # OpenTelemetry tracing (optional — disabled by default for dev environments without a collector)
      OTEL_ENABLED: ${OTEL_ENABLED:-false}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://jaeger:4318}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      qdrant:
        condition: service_started
      jaeger:
        condition: service_started
    networks: [darioos]

  frontend:
    build:
      context: ../frontend
      args:
        NEXT_PUBLIC_API_URL: /api
    restart: unless-stopped
    depends_on: [backend]
    networks: [darioos]

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dario}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-darioos}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dario} -d ${POSTGRES_DB:-darioos}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [darioos]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks: [darioos]

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    networks: [darioos]

  jaeger:
    image: jaegertracing/all-in-one:latest
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      MEMORY_MAX_TRACES: "10000"
    ports:
      - "4318:4318"  # OTLP/HTTP receiver
      - "16686:16686"  # Web UI
    volumes:
      - jaeger_data:/badger
    networks: [darioos]

  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    environment:
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: 5678
      WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://localhost:5678/}
      GENERIC_TIMEZONE: ${TZ:-America/Sao_Paulo}
    volumes:
      - n8n_data:/home/node/.n8n
    networks: [darioos]

  openwa:
    build: ./openwa
    restart: unless-stopped
    # If you set OPENWA_API_KEY in .env, also append: --key <the same value>
    command: >-
      --socket
      --port 8002
      --api-host http://openwa:8002
      --webhook http://backend:8000/api/webhooks/whatsapp
    ports:
      - "8002:8002"
    volumes:
      - openwa_data:/sessions
    networks: [darioos]

  prometheus:
    image: prom/prometheus:v2.45.0
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--storage.tsdb.retention.size=15GB'
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks: [darioos]
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5

  alertmanager:
    image: prom/alertmanager:v0.25.0
    restart: unless-stopped
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    networks: [darioos]
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9093/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      ALERTMANAGER_WEBHOOK_URL: ${ALERTMANAGER_WEBHOOK_URL:-}
      ALERTMANAGER_WEBHOOK_SECRET: ${ALERTMANAGER_WEBHOOK_SECRET:-}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      ALERT_EMAIL_CRITICAL: ${ALERT_EMAIL_CRITICAL:-}
      ALERT_EMAIL_DEFAULT: ${ALERT_EMAIL_DEFAULT:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}

  grafana:
    image: grafana/grafana:10.0.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:?set GF_SECURITY_ADMIN_PASSWORD in .env}
      GF_INSTALL_PLUGINS: grafana-piechart-panel
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    networks: [darioos]
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      prometheus:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on: [backend, frontend]
    networks: [darioos]

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  jaeger_data:
  n8n_data:
  openwa_data:
  prometheus_data:
  alertmanager_data:
  grafana_data:
  caddy_data:
  caddy_config:

networks:
  darioos:
    driver: bridge
